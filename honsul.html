<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼술 건배 🥂</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/suit-font@1.0.0/dist/variable/SUIT-Variable.css">
<style>
  @font-face {
    font-family: 'Jamsil';
    src: url('fonts/Jamsil-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Jamsil';
    src: url('fonts/Jamsil-Bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Jamsil';
    src: url('fonts/Jamsil-ExtraBold.otf') format('opentype');
    font-weight: 900;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; }

  :root {
    --amber: #e8902a;
    --amber-deep: #c4660a;
    --amber-light: #ffd27a;
    --dark: #0f0a04;
    --dark2: #1c1209;
    --dark3: #2b1c0e;
    --cream: #fdf3dc;
    --warm-white: #fff8ee;
  }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'SUIT', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* 배경 노이즈 + 조명 효과 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(232,144,42,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding-top: max(90px, env(safe-area-inset-top, 20px));
    padding-bottom: max(24px, env(safe-area-inset-bottom, 20px));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* 상단 타이틀 */
  .title-area {
    text-align: center;
  }

  .title-area h1 {
    font-family: 'Jamsil', sans-serif;
    font-size: clamp(28px, 6vw, 40px);
    color: var(--amber-light);
    letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(232,144,42,0.6);
    line-height: 1.1;
  }

  .title-area p {
    font-size: 17px;
    color: rgba(255,248,238,0.85);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* 카메라 뷰 */
  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid rgba(232,144,42,0.25);
    background: var(--dark2);
    box-shadow: 0 0 60px rgba(232,144,42,0.08), inset 0 0 40px rgba(0,0,0,0.5);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
    transition: opacity 0.6s;
  }

  #video.active { opacity: 1; }

  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* 카메라 시작 전 오버레이 */
  .camera-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--dark2);
    transition: opacity 0.5s;
    z-index: 2;
  }

  .camera-overlay.hidden { opacity: 0; pointer-events: none; }

  .camera-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .camera-overlay p {
    font-size: 18px;
    color: rgba(255,248,238,0.85);
    text-align: center;
    line-height: 1.6;
  }

  #cam-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }

  /* 시작 버튼 */
  #start-btn {
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color: var(--dark);
    font-family: 'Jamsil', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    border: none;
    padding: 12px 32px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(232,144,42,0.4);
    margin-top: 8px;
  }

  #start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,144,42,0.55); }
  #start-btn:active { transform: scale(0.97); }

  /* 상태 표시 */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 15px;
    color: rgba(255,248,238,0.85);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,248,238,0.2);
    transition: background 0.3s;
  }

  .status-dot.scanning { background: var(--amber); animation: pulse-dot 1.5s infinite; }
  .status-dot.detected { background: #4ade80; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* =================== 건배 팝업 =================== */
  #toast-popup {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }

  #toast-popup.show {
    pointer-events: all;
    animation: popup-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  #toast-popup.hide {
    animation: popup-out 0.35s ease-in forwards;
  }

  @keyframes popup-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popup-out {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  .popup-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15,10,4,0.85);
    backdrop-filter: blur(8px);
  }

  .popup-content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transform: translateZ(0);
    -webkit-font-smoothing: antialiased;
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    box-sizing: border-box;
  }

  .cheers-emoji {
    width: 100px;
    height: 100px;
    object-fit: contain;
    animation: glass-clink 0.6s 0.1s both;
    display: block;
  }

  @keyframes glass-clink {
    0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(5deg); }
    80%  { transform: scale(0.95) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .cheers-title {
    font-family: 'Jamsil', sans-serif;
    font-size: clamp(48px, 12vw, 80px);
    color: var(--amber-light);
    text-shadow: 0 0 60px rgba(255,210,122,0.9), 0 0 120px rgba(232,144,42,0.5);
    animation: title-rise 0.5s 0.2s both;
    letter-spacing: 4px;
    line-height: 1;
  }

  @keyframes title-rise {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .cheers-sub {
    font-size: clamp(18px, 4.5vw, 22px);
    color: rgba(255,248,238,0.92);
    animation: title-rise 0.5s 0.3s both;
    line-height: 1.6;
  }

  .cheers-sub strong {
    color: var(--amber-light);
    font-weight: 700;
  }

  .tap-hint {
    font-size: 17px;
    font-weight: 700;
    color: rgba(255,248,238,1.0);
    letter-spacing: 0.5px;
    animation: blink 1s 0.5s infinite;
    margin-top: 4px;
    text-shadow: 0 0 12px rgba(255,210,122,0.6);
    -webkit-font-smoothing: antialiased;
  }

  @keyframes blink {
    0%,100% { opacity: 0.9; }
    50% { opacity: 0.45; }
  }

  /* =================== 컨페티 =================== */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 101;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 8px;
    opacity: 0;
    animation: confetti-fall var(--dur) var(--delay) ease-in forwards;
    border-radius: var(--r);
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* 감지 박스 */
  .det-box {
    position: absolute;
    border: 2px solid rgba(232,144,42,0.7);
    border-radius: 6px;
    background: rgba(232,144,42,0.08);
    pointer-events: none;
    transition: all 0.1s;
  }

  .det-label {
    position: absolute;
    top: -22px; left: 0;
    font-size: 15px;
    background: var(--amber);
    color: var(--dark);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* 권한 거부 안내 */
  #perm-guide {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 24px 20px;
    text-align: center;
  }

  #perm-guide.show { display: flex; }

  .perm-icon { font-size: 44px; }

  .perm-title {
    font-family: 'Jamsil', sans-serif;
    font-size: 24px;
    color: var(--amber-light);
  }

  .perm-desc {
    font-size: 17px;
    color: rgba(255,248,238,0.9);
    line-height: 1.7;
  }

  .steps {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(232,144,42,0.08);
    border: 1px solid rgba(232,144,42,0.18);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 17px;
    line-height: 1.55;
    color: rgba(255,248,238,0.95);
  }

  .step-num {
    min-width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--amber);
    color: var(--dark);
    font-size: 15px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .browser-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .browser-tab {
    font-size: 16px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(232,144,42,0.3);
    background: transparent;
    color: rgba(255,248,238,0.85);
    cursor: pointer;
    font-family: 'SUIT', sans-serif;
    transition: all 0.15s;
  }

  .browser-tab.active {
    background: rgba(232,144,42,0.15);
    border-color: var(--amber);
    color: var(--amber-light);
  }

  #retry-btn {
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color: var(--dark);
    font-family: 'Jamsil', sans-serif;
    font-size: 19px;
    letter-spacing: 1px;
    border: none;
    padding: 11px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(232,144,42,0.4);
  }

  #retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,144,42,0.55); }

  #manual-btn {
    background: transparent;
    color: rgba(255,248,238,0.8);
    font-family: 'SUIT', sans-serif;
    font-size: 17px;
    border: 1px dashed rgba(232,144,42,0.25);
    padding: 8px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  #manual-btn:hover {
    color: var(--amber-light);
    border-color: rgba(232,144,42,0.6);
    background: rgba(232,144,42,0.07);
  }

  #glass-picker {
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    animation: fadein 0.4s both;
  }

  .glass-picker-label {
    font-size: 16px;
    color: rgba(255,248,238,0.8);
    letter-spacing: 0.3px;
  }

  .camera-hint {
    font-size: 16px;
    color: rgba(255,248,238,0.8);
    letter-spacing: 0.3px;
  }

  .glass-options {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    width: 100%;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .glass-options::-webkit-scrollbar { display: none; }

  .glass-opt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: rgba(255,248,238,0.04);
    border: 1.5px solid rgba(232,144,42,0.18);
    border-radius: 12px;
    padding: 10px 10px 8px;
    cursor: pointer;
    transition: all 0.18s;
    min-width: 64px;
    flex-shrink: 0;
  }

  .glass-opt:hover {
    border-color: rgba(232,144,42,0.5);
    background: rgba(232,144,42,0.08);
  }

  .glass-opt.active {
    border-color: var(--amber);
    background: rgba(232,144,42,0.15);
    box-shadow: 0 0 12px rgba(232,144,42,0.25);
  }

  .glass-icon {
    width: 40px;
    height: 40px;
    object-fit: contain;
    display: block;
  }

  .glass-name {
    font-size: 14px;
    color: rgba(255,248,238,0.88);
    letter-spacing: -0.2px;
    white-space: nowrap;
  }

  .glass-opt.active .glass-name { color: var(--amber-light); }

  #total-counter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 16px;
    color: rgba(255,248,238,0.75);
    animation: fadein 0.5s both;
  }

  #counter-num {
    color: var(--amber-light);
    font-weight: 700;
  }

  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .together-count {
    font-size: 17px;
    color: rgba(255,248,238,0.88);
    animation: title-rise 0.5s 0.5s both;
    line-height: 1.6;
  }

  .together-count strong { color: var(--amber-light); }

  /* ===== 건배사 입력 ===== */
  .cheers-input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: title-rise 0.4s 0.4s both;
  }

  .cheers-input-area textarea {
    width: 100%;
    background: rgba(255,248,238,0.07);
    border: 1.5px solid rgba(232,144,42,0.3);
    border-radius: 12px;
    color: var(--cream);
    font-family: 'SUIT', sans-serif;
    font-size: 18px;
    line-height: 1.5;
    padding: 10px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    -webkit-font-smoothing: antialiased;
  }

  .cheers-input-area textarea::placeholder { color: rgba(255,248,238,0.55); }
  .cheers-input-area textarea:focus { border-color: var(--amber); }

  .cheers-input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .cheers-char-count {
    font-size: 15px;
    color: rgba(255,248,238,0.65);
  }

  .cheers-submit {
    background: linear-gradient(135deg, var(--amber), var(--amber-deep));
    color: var(--dark);
    font-family: 'Jamsil', sans-serif;
    font-size: 17px;
    border: none;
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }

  .cheers-submit:hover { transform: translateY(-1px); }
  .cheers-submit:disabled { opacity: 0.35; cursor: default; transform: none; }

  /* ===== 떠다니는 말풍선 ===== */
  .bubble-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }

  .speech-bubble {
    position: absolute;
    bottom: 100px;
    background: rgba(28,18,9,0.92);
    border: 1px solid rgba(232,144,42,0.4);
    border-radius: 16px 16px 16px 4px;
    padding: 10px 14px;
    max-width: 220px;
    animation: bubble-rise var(--bdur) ease-out forwards;
    -webkit-font-smoothing: antialiased;
  }

  .speech-bubble.mine {
    border-radius: 16px 16px 4px 16px;
    border-color: rgba(232,144,42,0.7);
    background: rgba(42,28,14,0.95);
  }

  .bubble-msg {
    font-size: 17px;
    color: var(--cream);
    line-height: 1.5;
    word-break: keep-all;
  }

  .bubble-meta {
    font-size: 14px;
    color: rgba(255,248,238,0.75);
    margin-top: 4px;
  }

  @keyframes bubble-rise {
    0%   { transform: translateY(0); opacity: 0; }
    10%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translateY(-180px); opacity: 0; }
  }

  /* ======= 건배사 입력 ======= */
  .cheers-input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: title-rise 0.4s 0.4s both;
  }

  .cheers-input-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
  }

  #cheers-text {
    flex: 1;
    min-width: 0;
    background: rgba(255,248,238,0.07);
    border: 1.5px solid rgba(232,144,42,0.35);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 18px;
    color: var(--cream);
    font-family: 'SUIT', sans-serif;
    outline: none;
    -webkit-font-smoothing: antialiased;
    transition: border-color 0.2s;
  }

  #cheers-text::placeholder { color: rgba(255,248,238,0.6); }
  #cheers-text:focus { border-color: var(--amber); background: rgba(232,144,42,0.1); }

  #cheers-send {
    background: var(--amber);
    color: var(--dark);
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'SUIT', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }

  #cheers-send:hover { background: var(--amber-light); }
  #cheers-send:active { transform: scale(0.96); }
  #cheers-send:disabled { opacity: 0.4; cursor: default; }

  .cheers-input-hint {
    font-size: 15px;
    color: rgba(255,248,238,0.65);
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ======= 플로팅 말풍선 ======= */
  #bubble-container {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 200;
  }

  .cheers-bubble {
    background: rgba(28,18,9,0.92);
    border: 1.5px solid rgba(232,144,42,0.4);
    border-radius: 20px 20px 20px 4px;
    padding: 10px 18px;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: bubble-up 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    backdrop-filter: blur(4px);
    -webkit-font-smoothing: antialiased;
  }

  .cheers-bubble.fade-out {
    animation: bubble-fade 0.6s ease-in forwards;
  }

  .bubble-text {
    font-size: 18px;
    color: var(--cream);
    line-height: 1.5;
    font-weight: 500;
  }

  .bubble-glass {
    font-size: 15px;
    color: var(--amber);
    font-weight: 700;
  }

  .cheers-bubble.mine {
    border-color: rgba(232,144,42,0.8);
    border-radius: 20px 20px 4px 20px;
    background: rgba(50,30,10,0.97);
  }

  @keyframes bubble-up {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  @keyframes bubble-fade {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-16px); }
  }

  /* ======= 메인 건배사 입력 + 피드 ======= */
  #message-section {
    flex-direction: column;
    gap: 10px;
    animation: fadein 0.4s both;
  }

  .msg-input-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #main-cheers-text {
    flex: 1;
    background: rgba(255,248,238,0.06);
    border: 1.5px solid rgba(232,144,42,0.3);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 17px;
    color: var(--cream);
    font-family: 'SUIT', sans-serif;
    outline: none;
    -webkit-font-smoothing: antialiased;
    transition: border-color 0.2s;
  }

<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('cam-overlay');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const popup = document.getElementById('toast-popup');
const loadingBar = document.getElementById('loading-bar');

let model = null;
let detecting = false;
let lastToast = 0;
const TOAST_COOLDOWN = 8000;
const SCORE_THRESHOLD = 0.22;

const CHEERS_MESSAGES = [
  ['오늘도 수고한 <strong>나</strong>에게', '한 잔 바칩니다 🍻'],
  ['아무도 없어도 괜찮아', '<strong>내가 있잖아</strong> 🥹'],
  ['혼자라서 더 자유로운 밤', '<strong>나를 위한 건배</strong> 🌙'],
  ['오늘의 모든 일들에게', '<strong>수고했어, 잘했어</strong> 👏'],
  ['세상에서 가장 편한 술자리', '<strong>혼술이 최고야</strong> ✨'],
  ['잔이 감지됐습니다!', '<strong>건배할 준비 완료</strong> 🎉'],
];

const TARGET_CLASSES = ['cup', 'wine glass', 'bottle', 'bowl'];

const BROWSER_GUIDES = {
  chrome: [
    ['주소창 왼쪽', '🔒 자물쇠 아이콘을 클릭하세요'],
    ['카메라 항목', '"카메라"를 찾아 <strong>허용</strong>으로 변경하세요'],
    ['페이지 새로고침', '변경 후 페이지를 새로고침하고 다시 시도하세요'],
  ],
  safari: [
    ['Safari 메뉴', '상단 <strong>Safari → 설정 → 웹사이트</strong> 탭을 여세요'],
    ['카메라 섹션', '왼쪽 목록에서 <strong>카메라</strong>를 선택하세요'],
    ['이 사이트 허용', '현재 사이트를 찾아 <strong>허용</strong>으로 변경하세요'],
  ],
  firefox: [
    ['주소창 왼쪽', '🔒 자물쇠 아이콘 → <strong>연결 보안</strong>을 클릭하세요'],
    ['권한 설정', '<strong>권한 더 보기</strong>에서 카메라 항목을 허용으로 바꾸세요'],
    ['새로고침', '페이지를 새로고침하고 다시 시도하세요'],
  ],
  mobile: [
    ['기기 설정 앱', '<strong>설정 → 앱 → 브라우저 앱</strong>으로 이동하세요'],
    ['권한 항목', '<strong>권한 → 카메라</strong>를 허용으로 변경하세요'],
    ['브라우저로 돌아오기', '다시 이 페이지로 와서 버튼을 눌러보세요'],
  ],
};

function showBrowserGuide(browser) {
  document.querySelectorAll('.browser-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  const stepsEl = document.getElementById('guide-steps');
  stepsEl.innerHTML = BROWSER_GUIDES[browser].map(([label, desc], i) => `
    <div class="step">
      <div class="step-num">${i + 1}</div>
      <div><strong style="color:var(--amber-light);display:block;margin-bottom:2px;">${label}</strong>${desc}</div>
    </div>
  `).join('');
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.classList.add('active');
      overlay.classList.add('hidden');
      loadModel();
    };
  } catch (e) {
    console.error(e);
    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      showPermGuide();
    } else if (e.name === 'NotFoundError') {
      setStatus('', '카메라를 찾을 수 없어요 📷');
    } else {
      setStatus('', `카메라 오류: ${e.message}`);
    }
  }
}

function showPermGuide() {
  document.getElementById('cam-start').style.display = 'none';
  document.getElementById('perm-guide').classList.add('show');

  // 브라우저 자동 감지
  const ua = navigator.userAgent;
  let detected = 'chrome';
  if (/safari/i.test(ua) && !/chrome/i.test(ua)) detected = 'safari';
  else if (/firefox/i.test(ua)) detected = 'firefox';
  else if (/mobile|android|iphone/i.test(ua)) detected = 'mobile';

  document.querySelectorAll('.browser-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase().includes(detected) || (detected === 'mobile' && t.textContent === '모바일'));
  });
  showBrowserGuide(detected);
  setStatus('', '카메라 권한이 필요해요');
}

async function loadModel() {
  setStatus('ai-loading', '🤖 AI 모델 로딩 중...');
  loadingBar.classList.add('show');
  try {
    model = await cocoSsd.load();
    loadingBar.classList.remove('show');
    setStatus('scanning', '컵을 들어보세요!');
    document.getElementById('manual-btn').style.display = 'block';
    requestAnimationFrame(detect);
  } catch(e) {
    loadingBar.classList.remove('show');
    setStatus('', '모델 로딩 실패');
    console.error(e);
  }
}

function setStatus(type, text) {
  statusText.textContent = text;
  statusDot.className = 'status-dot';
  if (type === 'scanning') statusDot.classList.add('scanning');
  if (type === 'detected') statusDot.classList.add('detected');
}

async function detect() {
  if (!model || !video.videoWidth) { requestAnimationFrame(detect); return; }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let predictions = [];
  try { predictions = await model.detect(video); } catch(e) {}

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let found = false;
  const drinkItems = predictions.filter(p =>
    TARGET_CLASSES.includes(p.class) && p.score > SCORE_THRESHOLD
  );

  for (const pred of drinkItems) {
    found = true;
    const [x, y, w, h] = pred.bbox;
    const score = Math.round(pred.score * 100);
    const fx = canvas.width - x - w;

    ctx.strokeStyle = 'rgba(232,144,42,0.85)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(fx, y, w, h, 6);
    ctx.stroke();
    ctx.fillStyle = 'rgba(232,144,42,0.1)';
    ctx.fill();

    const label = `${getKorean(pred.class)} ${score}%`;
    ctx.font = 'bold 12px sans-serif';
    const labelW = ctx.measureText(label).width + 16;
    const labelH = 22;
    const labelX = Math.min(fx, canvas.width - labelW - 2);
    const labelY = y < labelH + 4 ? y + h : y - labelH - 2;

    ctx.fillStyle = 'rgba(232,144,42,1)';
    ctx.beginPath();
    ctx.roundRect(labelX, labelY, labelW, labelH, 4);
    ctx.fill();
    ctx.fillStyle = '#0f0a04';
    ctx.fillText(label, labelX + 8, labelY + 15);
  }

  if (found) {
    setStatus('detected', '✅ 잔 발견! 건배 준비 완료!');
    const now = Date.now();
    if (now - lastToast > TOAST_COOLDOWN) {
      lastToast = now;
      showToast();
    }
  } else {
    setStatus('scanning', '컵을 들어보세요!');
  }

  requestAnimationFrame(detect);
}

function getKorean(cls) {
  if (cls === 'wine glass') return '와인잔';
  if (cls === 'bottle') return '병';
  if (cls === 'cup') return '컵';
  return '잔';
}

function selectBg(theme) {
  document.body.className = document.body.className
    .replace(/theme-\S+/g, '').trim();
  if (theme !== 'default') document.body.classList.add('theme-' + theme);
}

let selectedGlass = { emoji: '🍷', name: '와인잔', img: 'images/cup_wine.png', filledImg: 'images/filled_wine.png' };

function selectGlass(el, emoji, name, img, filledImg) {
  document.querySelectorAll('.glass-opt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedGlass = { emoji, name, img, filledImg };
  const btn = document.getElementById('manual-btn');
  if (btn) btn.innerHTML = `<img src="${img}" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;margin-right:4px;"> 그냥 건배하기`;
}

let autoCloseTimer = null;
let lastSubmitTs = 0;
let countdownInterval = null;

function loadCounter() {
  if (db) {
    db.ref('cheers_count').on('value', snap => {
      const n = snap.val() || 0;
      updateCounterUI(n);
      localStorage.setItem('honseul_total', n);
    });
  } else {
    const n = parseInt(localStorage.getItem('honseul_total') || '0');
    updateCounterUI(n);
  }
  document.getElementById('total-counter').style.display = 'flex';
}

async function incrementCounter() {
  if (db) {
    const ref = db.ref('cheers_count');
    await ref.transaction(current => (current || 0) + 1);
  } else {
    const n = parseInt(localStorage.getItem('honseul_total') || '0') + 1;
    localStorage.setItem('honseul_total', n);
    updateCounterUI(n);
  }
}

function updateCounterUI(n) {
  document.getElementById('counter-num').textContent = n.toLocaleString();
}

const DEFAULT_MESSAGES = [
  { text: '오늘도 살아있어서 건배', glass: '🍷' },
  { text: '이 한 잔이 오늘의 전부야', glass: '🍺' },
  { text: '혼자라서 오히려 좋아', glass: '🥛' },
  { text: '수고했어 오늘도', glass: '🍶' },
  { text: '내일은 더 잘 될 거야', glass: '🥃' },
];

function loadMessages() {
  try {
    return JSON.parse(localStorage.getItem('honseul_messages') || '[]');
  } catch { return []; }
}

function saveMessage(text, glass) {
  const msgs = loadMessages();
  msgs.unshift({ text, glass, ts: Date.now() });
  if (msgs.length > 100) msgs.pop();
  localStorage.setItem('honseul_messages', JSON.stringify(msgs));
}

function showFloatingBubble(text, glass) {
  const container = document.getElementById('bubble-container');
  const el = document.createElement('div');
  el.className = 'cheers-bubble';
  el.innerHTML = `<span class="bubble-text">"${text}"</span><span class="bubble-glass">${glass} 로 건배</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }, 3500);
}

function submitCheersMessage() {
  const input = document.getElementById('cheers-text');
  const text = input.value.trim();
  if (!text) return;
  saveMessage(text, selectedGlass.emoji);
  input.value = '';
  document.getElementById('cheers-send').disabled = true;
  document.getElementById('cheers-send').textContent = '✓ 남겼어요';
  resumeCountdown();
  showFloatingBubble(text, selectedGlass.emoji);
}

function showRandomSavedBubble() {
  const msgs = loadMessages();
  const pool = msgs.length ? msgs : DEFAULT_MESSAGES;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  if (pick) setTimeout(() => showFloatingBubble(pick.text, pick.glass || '🥂'), 1200);
}

let countdownPaused = false;

function pauseCountdown() {
  if (countdownPaused) return;
  countdownPaused = true;
  clearTimeout(autoCloseTimer);
  clearInterval(countdownInterval);
  document.getElementById('countdown-hint').textContent = '입력 중... ⏸';
}

function resumeCountdown() {
  if (!countdownPaused) return;
  countdownPaused = false;
  let remaining = 3;
  const hint = document.getElementById('countdown-hint');
  hint.textContent = `${remaining}초 후 자동으로 닫혀요`;
  countdownInterval = setInterval(() => {
    remaining--;
    hint.textContent = remaining > 0 ? `${remaining}초 후 자동으로 닫혀요` : '';
  }, 1000);
  autoCloseTimer = setTimeout(() => {
    clearInterval(countdownInterval);
    hideToast();
  }, 3000);
}

function showToast() {
  const cheersEmoji = document.querySelector('.cheers-emoji');
  cheersEmoji.src = selectedGlass.filledImg;
  cheersEmoji.alt = selectedGlass.name;
  document.querySelector('.cheers-title').textContent = '건배!';

  const input = document.getElementById('cheers-text');
  input.value = '';
  const sendBtn = document.getElementById('cheers-send');
  sendBtn.disabled = false;
  sendBtn.textContent = '남기기';
  input.oncompositionstart = () => { input._composing = true; };
  input.oncompositionend = () => { input._composing = false; };
  input.onkeydown = e => { if (e.key === 'Enter' && !e.isComposing && !input._composing) submitCheersMessage(); };

  countdownPaused = false;
  popup.className = '';
  popup.style.opacity = '';
  popup.classList.add('show');
  spawnConfetti();

  incrementCounter();

  clearTimeout(autoCloseTimer);
  clearInterval(countdownInterval);

  let remaining = 5;
  const hint = document.getElementById('countdown-hint');
  hint.textContent = `${remaining}초 후 자동으로 닫혀요`;

  countdownInterval = setInterval(() => {
    remaining--;
    hint.textContent = remaining > 0 ? `${remaining}초 후 자동으로 닫혀요` : '';
  }, 1000);

  autoCloseTimer = setTimeout(() => {
    clearInterval(countdownInterval);
    hideToast();
  }, 5000);
}

function hideToast() {
  popup.classList.remove('show');
  popup.classList.add('hide');
  popup.addEventListener('animationend', () => {
    popup.className = '';
    popup.style.opacity = '0';
    document.getElementById('confetti-container').innerHTML = '';
  }, { once: true });
}

function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#ffd27a', '#e8902a', '#ff6b6b', '#4ade80', '#60a5fa', '#f0abfc', '#fff8ee', '#fbbf24'];
  const shapes = ['0%', '50%', '4px'];

  for (let i = 0; i < 90; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --dur: ${1.8 + Math.random() * 1.8}s;
      --delay: ${Math.random() * 0.8}s;
      --r: ${shapes[Math.floor(Math.random() * shapes.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      transform: rotate(${Math.random()*360}deg);
    `;
    container.appendChild(piece);
  }
}

function relTime(ts) {
  const d = (Date.now() - ts) / 1000;
  if (d < 60) return '방금 전';
  if (d < 3600) return `${Math.floor(d/60)}분 전`;
  if (d < 86400) return `${Math.floor(d/3600)}시간 전`;
  return `${Math.floor(d/86400)}일 전`;
}

function renderFeed(msgs) {
  const feed = document.getElementById('msg-feed');
  if (!feed) return;
  feed.innerHTML = '';
  const list = [...msgs].reverse().slice(0, 20);
  list.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'msg-item' + (m.mine ? ' mine' : '');
    el.innerHTML = `
      <span class="msg-glass">${m.glass || '🥂'}</span>
      <div class="msg-body">
        <div class="msg-text">${m.text}</div>
        <div class="msg-time">${m.ts ? relTime(m.ts) : ''}</div>
      </div>`;
    el.style.animationDelay = `${i * 0.04}s`;
    feed.appendChild(el);
  });
}

function listenToMessages() {
  if (db) {
    db.ref('honseul_messages').limitToLast(40).on('value', snap => {
      const data = snap.val();
      firebaseMsgs = data ? Object.values(data) : [];
    });
    const startTs = Date.now();
    db.ref('honseul_messages').limitToLast(1).on('child_added', snap => {
      const m = snap.val();
      if (m && m.ts > startTs + 1000 && m.ts !== lastSubmitTs) spawnBubble(m.text, m.glass, false);
    });
  } else {
    firebaseMsgs = [...SEED_MSGS];
  }
}

function submitCheersMessage() {
  const input = document.getElementById('cheers-text');
  const text = input ? input.value.trim() : '';
  if (!text) return;

  const msg = { text, glass: selectedGlass.emoji, ts: Date.now() };
  lastSubmitTs = msg.ts;

  if (db) {
    db.ref('honseul_messages').push(msg);
  } else {
    firebaseMsgs.push(msg);
  }

  spawnBubble(text, selectedGlass.emoji, true);
  if (input) input.value = '';

  const btn = document.getElementById('cheers-send');
  btn.disabled = true;
  btn.textContent = '✓ 남겼어요';

  clearTimeout(autoCloseTimer);
  clearInterval(countdownInterval);
  let remaining = 3;
  const hint = document.getElementById('countdown-hint');
  hint.textContent = `${remaining}초 후 닫혀요`;
  countdownInterval = setInterval(() => {
    remaining--;
    hint.textContent = remaining > 0 ? `${remaining}초 후 닫혀요` : '';
  }, 1000);
  autoCloseTimer = setTimeout(() => {
    clearInterval(countdownInterval);
    hideToast();
  }, 3000);
}

let bubbleShowStarted = false;
function startBubbleShow() {
  if (bubbleShowStarted) return;
  bubbleShowStarted = true;
  const show = () => {
    const pool = firebaseMsgs.length ? firebaseMsgs : SEED_MSGS;
    const m = pool[Math.floor(Math.random() * pool.length)];
    if (m) spawnBubble(m.text, m.glass || '🥂', false);
  };
  setTimeout(show, 4000);
  setInterval(show, 9000);
}

document.addEventListener('DOMContentLoaded', () => {

  if (!input) return;
  input.oncompositionstart = () => { input._composing = true; };

  input.onkeydown = e => { if (e.key === 'Enter' && !e.isComposing && !input._composing) submitCheersMessage(); };

  const glassOptions = document.querySelector('.glass-options');

});

function spawnBubble(text, glass, isMine = false) {
  const container = document.getElementById('bubble-container');
  const el = document.createElement('div');
  el.className = 'cheers-bubble' + (isMine ? ' mine' : '');
  el.innerHTML = `<div class="bubble-text">${text}</div><div class="bubble-glass">${glass} 혼술러</div>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 700);
  }, isMine ? 4500 : 3500);
}

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}
